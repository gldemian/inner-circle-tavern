<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;500;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --brand-black: #000000;
      --brand-midnight: #0A0A0A;
      --brand-gray: #1A1A1A;
      --brand-platinum: #E5E5E5;
      --brand-white: #FFFFFF;
    }

    body {
      background-color: var(--brand-black);
      color: var(--brand-white);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .heading-font {
      font-family: 'Outfit', sans-serif;
    }

    /* Hide horizontal scrollbar for category tabs */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .sticky-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .category-tab {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-bottom: 2px solid transparent;
      opacity: 0.4;
    }

    .category-tab.active {
      border-color: var(--brand-white);
      opacity: 1;
      transform: scale(1.05);
    }

    .menu-section {
      scroll-margin-top: 100px;
    }

    .dietary-icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      margin-left: 10px;
    }

    .ic-ring {
      stroke-dasharray: 2 2;
      opacity: 0.3;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.5);
    }

    .menu-item-price {
      font-variant-numeric: tabular-nums;
    }

    .animate-fade-in {
      animation: fadeIn 0.8s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #back-to-top {
      transition: all 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }

    #back-to-top.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Tooltip Styling */
    #dietary-tooltip {
      position: fixed;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 200px;
    }

    #dietary-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

    let currentMenu = 'food';

    function switchMenu(type) {
      if (currentMenu === type) return;

      // Block observer updates during the transition scroll
      isManualClick = true;
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => { isManualClick = false; }, 1000);

      currentMenu = type;
      const foodBtn = document.getElementById('food-btn');
      const drinksBtn = document.getElementById('drinks-btn');

      const activeClass = "flex-1 py-2 px-10 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all duration-500 bg-white text-black shadow-lg";
      const inactiveClass = "flex-1 py-2 px-10 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all duration-500 text-white/40 hover:text-white";

      if (type === 'food') {
        foodBtn.className = activeClass;
        drinksBtn.className = inactiveClass;
      } else {
        drinksBtn.className = activeClass;
        foodBtn.className = inactiveClass;
      }

      renderMenu();

      // Ensure tabs are scrolled to the far left and auto-select first category
      const nav = document.getElementById('category-tabs');
      if (nav) nav.scrollLeft = 0;

      const firstCategory = menus[type].categories[0].replace(/\s+/g, '-').toLowerCase();
      setActiveTab(firstCategory, true);

      const menuContent = document.getElementById('menu-content');
      if (menuContent) {
        menuContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function renderMenu() {
      const nav = document.getElementById('category-tabs');
      const content = document.getElementById('menu-content');
      const menuData = menus[currentMenu];

      // Render Tabs
      nav.innerHTML = menuData.categories.map((cat, i) => {
        const id = cat.replace(/\s+/g, '-').toLowerCase();
        return `
          <a href="#${id}" onclick="setActiveTab('${id}', true)" 
             class="category-tab whitespace-nowrap py- px-2 text-[10px] font-bold uppercase tracking-[0.2em] text-white hover:opacity-100 ${i === 0 ? 'active' : ''}">
            ${cat}
          </a>
        `;
      }).join('');

      // Render Content
      content.innerHTML = menuData.data.map((sec, secIdx) => `
        <section id="${sec.category.replace(/\s+/g, '-').toLowerCase()}" class="menu-section">
          <div class="flex items-center gap-6 mb-12">
            <h2 class="heading-font text-2xl font-bold uppercase tracking-[0.3em]">${sec.category}</h2>
            <span class="flex-1 h-[1px] bg-gradient-to-r from-white/20 to-transparent"></span>
          </div>
          <div class="grid md:grid-cols-2 gap-x-12 gap-y-10">
            ${sec.items.map(item => `
              <div class="glass-card p-8 rounded-3xl group cursor-pointer" 
                   onclick="handleItemInteraction(event, ${JSON.stringify(item.tags || []).replace(/"/g, '&quot;')}, 'click')"
                   onmouseenter="handleItemInteraction(event, ${JSON.stringify(item.tags || []).replace(/"/g, '&quot;')}, 'hover')"
                   onmouseleave="handleItemInteraction(event, null, 'leave')">
                <div class="flex justify-between items-start gap-4 mb-3">
                  <h3 class="heading-font font-bold text-xl leading-tight uppercase tracking-wide group-hover:text-white transition-colors">
                    ${item.name}
                    ${(item.tags || []).map(t => icons[t]).join('')}
                  </h3>
                  <div class="menu-item-price heading-font font-bold text-lg text-white/90 bg-white/5 px-3 py-1 rounded-lg border border-white/5">
                    ${item.price || '--'}
                  </div>
                </div>
                ${item.desc ? `<p class="text-white/40 text-[13px] leading-relaxed font-light tracking-wide italic">${item.desc}</p>` : ''}
              </div>
            `).join('')}
          </div>
        </section>
      `).join('');

      // Re-initialize intersection observer
      setupObserver();
    }

    let isManualClick = false;
    let scrollTimeout;

    function setActiveTab(id, fromClick = false) {
      if (fromClick) {
        isManualClick = true;
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => { isManualClick = false; }, 800);
      }

      if (isManualClick && !fromClick) return;

      const tabs = document.querySelectorAll('.category-tab');
      tabs.forEach(tab => {
        const isActive = tab.getAttribute('href').slice(1) === id;
        if (isActive) {
          if (!tab.classList.contains('active')) {
            tab.classList.add('active');
            tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          }
        } else {
          tab.classList.remove('active');
        }
      });
    }

    function setupObserver() {
      const sections = document.querySelectorAll('.menu-section');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            setActiveTab(entry.target.id);
          }
        });
      }, { threshold: 0, rootMargin: '-10% 0px -85% 0px' });

      sections.forEach(s => observer.observe(s));
    }

    // Back to top visibility
    window.addEventListener('scroll', () => {
      const btn = document.getElementById('back-to-top');
      if (window.scrollY > 500) {
        btn.classList.add('visible');
      } else {
        btn.classList.remove('visible');
      }
    });

    // Initial render
    renderMenu();

    // Tooltip Implementation
    const tooltip = document.createElement('div');
    tooltip.id = 'dietary-tooltip';
    tooltip.className = 'glass-card p-4 rounded-2xl shadow-2xl backdrop-blur-xl border border-white/10';
    document.body.appendChild(tooltip);

    let tooltipTimeout;
    let isPersistent = false;

    function handleItemInteraction(event, tags, type) {
      if (type === 'leave') {
        if (!isPersistent) hideTooltip();
        return;
      }

      if (!tags || tags.length === 0) return;

      if (type === 'click') {
        isPersistent = true;
        clearTimeout(tooltipTimeout);
        tooltipTimeout = setTimeout(() => {
          isPersistent = false;
          hideTooltip();
        }, 3000);
      } else if (type === 'hover') {
        if (isPersistent) return;
      }
      
      const rect = event.currentTarget.getBoundingClientRect();
      const x = rect.left + (rect.width / 2);
      const y = rect.top - 10;

      showTooltip(tags, x, y);
    }

    function showTooltip(tags, x, y) {
      tooltip.innerHTML = `
        <div class="space-y-3">
          ${tags.map(t => `
            <div class="flex items-center gap-3">
              <div class="w-6 h-6 flex items-center justify-center">${icons[t]}</div>
              <span class="text-[10px] uppercase tracking-widest font-bold text-white/80">${dietaryLabels[t]}</span>
            </div>
          `).join('')}
        </div>
      `;

      // Position tooltip
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
      tooltip.style.transform = 'translate(-50%, -100%)';
      
      tooltip.classList.add('visible');
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
      isPersistent = false;
    }

    // Hide tooltip on scroll or clicking elsewhere
    window.addEventListener('scroll', hideTooltip);
    document.addEventListener('mousedown', (e) => {
      if (!tooltip.contains(e.target)) hideTooltip();
    });
  </script>
</body>

</html>
