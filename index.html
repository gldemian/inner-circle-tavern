<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inner Circle Tavern</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;500;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --brand-black: #000000;
      --brand-midnight: #0A0A0A;
      --brand-white: #FFFFFF;
    }

    body {
      background-color: var(--brand-black);
      color: var(--brand-white);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .heading-font {
      font-family: 'Outfit', sans-serif;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .map-container {
      position: relative;
      width: 100%;
      padding-bottom: 75%;
      height: 0;
      overflow: hidden;
    }

    .map-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Instagram embed overrides to remove default borders and shadow/shade */
    .ig-container iframe.instagram-media {
      margin: 0 !important;
      border: none !important;
      box-shadow: none !important;
      width: 100% !important;
      max-width: 100% !important;
      border-radius: 0 !important;
      background: transparent !important;
    }
  </style>
</head>

<body class="p-6 md:p-12 max-w-5xl mx-auto space-y-16">

  <!-- Header / Nav -->
  <header class="flex justify-between items-center border-b border-white/10 pb-6">
    <h1 class="heading-font text-2xl font-bold uppercase tracking-[0.2em]">Inner Circle Tavern</h1>
    <nav>
      <a href="menu/"
        class="text-xs uppercase tracking-widest font-bold border border-white/20 px-4 py-2 rounded-full hover:bg-white hover:text-black transition-colors">Menu</a>
    </nav>
  </header>

  <!-- Gallery Section Placeholder (Hidden if no images) -->
  <!-- 
  <section id="gallery" class="hidden">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <img src="..." alt="Gallery Image" class="w-full h-48 object-cover rounded-xl border border-white/10">
    </div>
  </section>
  -->

  <main class="space-y-6">
    <!-- Embeds Section -->
    <div class="grid md:grid-cols-2 gap-12">
      <!-- Map -->
      <section>
        <h2 class="text-xs uppercase tracking-widest text-white/40 font-bold mb-4">Map</h2>
        <div class="map-container rounded-2xl border border-white/10">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2996.596015697435!2d-81.3358274!3d41.31765130000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x88311782f1962ddf%3A0x20ecc61b7735758c!2sInner%20Circle%20Tavern!5e0!3m2!1sen!2sus!4v1776911566885!5m2!1sen!2sus"
            style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </section>

      <!-- Instagram -->
      <section>
        <h2 class="text-xs uppercase tracking-widest text-white/40 font-bold mb-4">Instagram</h2>
        <div class="ig-container rounded-2xl overflow-hidden border border-white/10 bg-white flex justify-center">
          <blockquote class="instagram-media"
            data-instgrm-permalink="https://www.instagram.com/innercircle_tavern/?utm_source=ig_embed&amp;utm_campaign=loading"
            data-instgrm-version="14"
            style="background:#000; border:0; margin: 0; max-width:540px; min-width:326px; padding:0; width:100%;">
          </blockquote>
        </div>
      </section>
    </div>

    <!-- Collapsible Info Sections -->
    <div class="space-y-4">
      <!-- Hours -->
      <details class="group glass-card rounded-2xl border border-white/10 overflow-hidden">
        <summary class="flex justify-between items-center p-6 cursor-pointer list-none [&::-webkit-details-marker]:hidden">
          <h2 class="text-xs uppercase tracking-widest text-white/40 font-bold">Hours</h2>
          <svg class="w-4 h-4 text-white/20 group-open:rotate-180 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </summary>
        <div class="px-6 pb-6 space-y-3 text-sm">
          <div class="flex justify-between border-b border-white/5 pb-2"><span
              class="text-white/60">Monday</span><span>Closed</span></div>
          <div class="flex justify-between border-b border-white/5 pb-2"><span
              class="text-white/60">Tuesday</span><span>4–10 PM</span></div>
          <div class="flex justify-between border-b border-white/5 pb-2"><span
              class="text-white/60">Wednesday</span><span>4–10 PM</span></div>
          <div class="flex justify-between border-b border-white/5 pb-2"><span
              class="text-white/60">Thursday</span><span>4–10 PM</span></div>
          <div class="flex justify-between border-b border-white/5 pb-2"><span
              class="text-white/60">Friday</span><span>4–10 PM</span></div>
          <div class="flex justify-between border-b border-white/5 pb-2"><span
              class="text-white/60">Saturday</span><span>4–10 PM</span></div>
          <div class="flex justify-between pt-1"><span class="text-white/60">Sunday</span><span>Closed</span></div>
        </div>
      </details>

      <!-- Location & Contact -->
      <details class="group glass-card rounded-2xl border border-white/10 overflow-hidden">
        <summary class="flex justify-between items-center p-6 cursor-pointer list-none [&::-webkit-details-marker]:hidden">
          <h2 class="text-xs uppercase tracking-widest text-white/40 font-bold">Location & Contact</h2>
          <svg class="w-4 h-4 text-white/20 group-open:rotate-180 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </summary>
        <div class="px-6 pb-6">
          <a href="https://www.google.com/maps/place/Inner+Circle+Tavern/@41.3176513,-81.3358274,17z/data=!3m1!4b1!4m6!3m5!1s0x88311782f1962ddf:0x20ecc61b7735758c!8m2!3d41.3176513!4d-81.3332525!16s%2Fg%2F11y4v2v0v5?entry=ttu" 
             target="_blank" class="block hover:opacity-70 transition-opacity mb-6">
            <p class="font-medium text-lg">271 E Garfield Rd</p>
            <p class="text-white/60">Aurora, OH 44202</p>
          </a>
          <a href="tel:234-781-9256" class="font-mono text-white/80 hover:text-white transition-colors">234-781-9256</a>
        </div>
      </details>
    </div>
  </main>

  <!-- Footer -->
  <footer
    class="border-t border-white/10 pt-8 mt-16 flex flex-col md:flex-row justify-between items-center gap-6 text-xs uppercase tracking-widest text-white/40">
    <span>&copy; Inner Circle Tavern</span>
    <div class="flex gap-8">
      <a href="https://www.google.com/maps/place/Inner+Circle+Tavern/@41.3176513,-81.3358274,17z/data=!3m1!4b1!4m6!3m5!1s0x88311782f1962ddf:0x20ecc61b7735758c!8m2!3d41.3176513!4d-81.3332525!16s%2Fg%2F11y4v2v0v5?entry=ttu"
        target="_blank" class="hover:text-white flex items-center gap-2 transition-colors">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        Location
      </a>
      <a href="https://www.instagram.com/innercircle_tavern/" target="_blank"
        class="hover:text-white flex items-center gap-2 transition-colors">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
        Instagram
      </a>
    </div>
  </footer>

  <script async src="//www.instagram.com/embed.js"></script>
</body>

</html>
